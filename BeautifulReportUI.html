      function todayStamp(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
      function reportTypeShort(t){ return String(t||"FIRST").toUpperCase()==="MONTHLY"?"Monthly":"First"; }
      function downloadPdf(){ setStatus("Building PDF..."); setLoading("downloadBtn",true,"Building...","Download PDF"); var n=document.querySelector("#reportRoot"), c=(LAST_RENDERED_DATA&&LAST_RENDERED_DATA.client_name)?LAST_RENDERED_DATA.client_name:"Lumina Logic LLC", f=reportTypeShort(CURRENT_REPORT_TYPE)+"_"+c+"_"+todayStamp()+".pdf"; if(!n||typeof html2pdf==="undefined"){ setLoading("downloadBtn",false,"Building...","Download PDF"); showDebug("downloadPdf unavailable"); return; } html2pdf().set({ margin:8, filename:f, image:{ type:"jpeg", quality:0.98 }, html2canvas:{ scale:2, useCORS:true, windowWidth:n.scrollWidth }, jsPDF:{ unit:"mm", format:"a4", orientation:"portrait" }, pagebreak:{ mode:["css","legacy"] } }).from(n).save().then(function(){ setLoading("downloadBtn",false,"Building...","Download PDF"); setStatus("PDF downloaded"); }).catch(function(err){ setLoading("downloadBtn",false,"Building...","Download PDF"); setStatus("PDF failed"); showDebug("downloadPdf failed",err); }); }
      function initPage(){ try{ applyToolbarMode(); document.getElementById("downloadBtn").addEventListener("click",downloadPdf); CURRENT_REPORT_TYPE=reportTypeLabel(CURRENT_REPORT_TYPE); renderLoadingState(CURRENT_REPORT_TYPE); loadData(); }catch(e){ showDebug("init failed",e); } }
      window.addEventListener("error",function(evt){ showDebug("window.onerror", evt&&(evt.error||evt.message||evt)); }); window.onunhandledrejection=function(evt){ showDebug("unhandledrejection", evt&&evt.reason?evt.reason:evt); };
      if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initPage); else initPage();
    </script>
  </body>
</html>
